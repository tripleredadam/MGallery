  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b1018;
      --surface: #131a26;
      --surface-elevated: #192231;
      --border: #1e2a3a;
      --border-subtle: #162030;
      --gold: #c9a87c;
      --gold-light: #dfc49e;
      --gold-dim: #8a7453;
      --gold-glow: rgba(201, 168, 124, 0.2);
      --marielle: #c9a87c;
      --adam: #7ca8c9;
      --text: #eae5dc;
      --text-muted: #7d8898;
      --text-dim: #4a5568;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */

    .header {
      text-align: center;
      padding: 60px 24px 40px;
      background: linear-gradient(180deg, #0f1722 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-logo {
      width: clamp(180px, 28vw, 280px);
      margin: 0 auto 16px;
      display: block;
    }

    .header-brand {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .header-subtitle {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    /* ── Stats ──────────────────────────────────── */

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      max-width: 600px;
      margin: 0 auto;
    }

    .stat-card {
      flex: 1;
      min-width: 200px;
      max-width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .stat-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .stat-name.marielle { color: var(--marielle); }
    .stat-name.adam { color: var(--adam); }

    .stat-count {
      font-family: var(--font-body);
      font-size: 32px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .progress-fill.marielle { background: var(--marielle); }
    .progress-fill.adam { background: var(--adam); }

    .stat-pct {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    /* ── Container ──────────────────────────────── */

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Search ─────────────────────────────────── */

    .search-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--gold-dim); }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-inner { position: relative; }

    /* ── Filter Toggle ─────────────────────────── */

    .filter-bar {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #0b1018;
    }

    /* ── Region ─────────────────────────────────── */

    .region {
      margin-top: 24px;
    }

    .region-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .region-header:hover { background: var(--surface-elevated); }

    .region-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .region-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .region-count {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .region-arrow {
      color: var(--text-dim);
      transition: transform 0.3s ease;
      font-size: 18px;
    }

    .region.collapsed .region-arrow { transform: rotate(-90deg); }
    .region.collapsed .region-body { display: none; }

    .region-body {
      margin-top: 2px;
    }

    /* ── Country ────────────────────────────────── */

    .country {
      margin-top: 2px;
    }

    .country-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 28px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .country-header:hover { background: var(--surface-elevated); }

    .country-flag { font-size: 18px; }

    .country-name {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .country-count {
      font-size: 11px;
      color: var(--text-dim);
    }

    .country-arrow {
      color: var(--text-dim);
      transition: transform 0.3s ease;
      font-size: 14px;
    }

    .country.collapsed .country-arrow { transform: rotate(-90deg); }
    .country.collapsed .country-body { display: none; }

    /* ── Hotel Row ──────────────────────────────── */

    .hotel-list { list-style: none; }

    .hotel-row {
      display: flex;
      align-items: center;
      padding: 10px 16px 10px 48px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s;
    }

    .hotel-row:hover { background: rgba(255, 255, 255, 0.015); }
    .hotel-row:last-child { border-bottom: none; }

    .hotel-info { flex: 1; min-width: 0; }

    .hotel-name {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hotel-city {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .hotel-toggles {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    /* ── Toggle Button ──────────────────────────── */

    .toggle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .toggle:hover {
      border-color: var(--text-muted);
      color: var(--text-muted);
    }

    .toggle.active-marielle {
      background: var(--marielle);
      border-color: var(--marielle);
      color: #0b1018;
      box-shadow: 0 0 16px var(--gold-glow);
    }

    .toggle.active-adam {
      background: var(--adam);
      border-color: var(--adam);
      color: #0b1018;
      box-shadow: 0 0 16px rgba(124, 168, 201, 0.2);
    }

    .toggle:active { transform: scale(0.9); }

    /* ── Column Headers ─────────────────────────── */

    .col-headers {
      display: flex;
      align-items: center;
      padding: 8px 16px 8px 48px;
      border-bottom: 1px solid var(--border);
    }

    .col-headers-spacer { flex: 1; }

    .col-header {
      width: 34px;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .col-header.m-label { color: var(--marielle); margin-right: 8px; }
    .col-header.a-label { color: var(--adam); }

    /* ── Footer ─────────────────────────────────── */

    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border-subtle);
      font-size: 12px;
      color: var(--text-dim);
    }

    .footer a {
      color: var(--gold-dim);
      text-decoration: none;
    }

    /* ── Sync indicator ─────────────────────────── */

    .sync-dot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2d6a4f;
      transition: background 0.3s;
      z-index: 200;
    }

    .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
    .sync-dot.error { background: #e63946; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── No results ─────────────────────────────── */

    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
      font-style: italic;
      font-family: var(--font-display);
      font-size: 18px;
      display: none;
    }

    /* ── Responsive ─────────────────────────────── */

    @media (max-width: 600px) {
      .header { padding: 40px 16px 32px; }
      .stats { gap: 16px; }
      .stat-card { padding: 18px; min-width: 150px; }
      .stat-count { font-size: 26px; }
      .hotel-row { padding-left: 32px; }
      .col-headers { padding-left: 32px; }
      .hotel-name { font-size: 13px; }
      .toggle { width: 30px; height: 30px; font-size: 10px; }
    }
  </style>
</head>

// ── Flatten hotels for counting ───────────────────────────

const ALL_HOTELS = [];
for (const region of REGIONS) {
  for (const country of region.countries) {
    for (const hotel of country.hotels) {
      ALL_HOTELS.push(hotel);
    }
  }
}
const TOTAL = ALL_HOTELS.length;

// ── State ─────────────────────────────────────────────────

let visits = {};

function isVisited(hotelId, person) {
  return visits[hotelId]?.[person] || false;
}

function setVisited(hotelId, person, value) {
  if (!visits[hotelId]) visits[hotelId] = { marielle: false, adam: false };
  visits[hotelId][person] = value;
  saveLocal();
  syncToServer(hotelId, person, value);
  updateStats();
}

// ── LocalStorage (immediate cache) ────────────────────────

function saveLocal() {
  try { localStorage.setItem('mgallery-visits', JSON.stringify(visits)); } catch {}
}

function loadLocal() {
  try {
    const data = localStorage.getItem('mgallery-visits');
    if (data) visits = JSON.parse(data);
  } catch {}
}

// ── API Sync ──────────────────────────────────────────────

const API_BASE = '/api';
const syncDot = document.getElementById('sync-dot');

async function fetchFromServer() {
  try {
    syncDot.className = 'sync-dot syncing';
    const res = await fetch(API_BASE);
    if (res.ok) {
      const serverData = await res.json();
      // Merge: server is source of truth
      for (const [hotelId, data] of Object.entries(serverData)) {
        visits[hotelId] = data;
      }
      saveLocal();
      renderToggles();
      updateStats();
    }
    syncDot.className = 'sync-dot';
  } catch {
    syncDot.className = 'sync-dot error';
  }
}

async function syncToServer(hotelId, person, visited) {
  try {
    syncDot.className = 'sync-dot syncing';
    await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hotelId, person, visited })
    });
    syncDot.className = 'sync-dot';
  } catch {
    syncDot.className = 'sync-dot error';
    // Data is still saved locally, will sync on next load
  }
}

// ── Stats ─────────────────────────────────────────────────

function updateStats() {
  let mCount = 0, aCount = 0;
  for (const hotel of ALL_HOTELS) {
    if (isVisited(hotel.id, 'marielle')) mCount++;
    if (isVisited(hotel.id, 'adam')) aCount++;
  }
  document.getElementById('stat-marielle-count').textContent = mCount;
  document.getElementById('stat-adam-count').textContent = aCount;
  document.getElementById('stat-total-m').textContent = TOTAL;
  document.getElementById('stat-total-a').textContent = TOTAL;

  const mPct = TOTAL > 0 ? ((mCount / TOTAL) * 100) : 0;
  const aPct = TOTAL > 0 ? ((aCount / TOTAL) * 100) : 0;
  document.getElementById('progress-marielle').style.width = mPct + '%';
  document.getElementById('progress-adam').style.width = aPct + '%';
  document.getElementById('stat-marielle-pct').textContent = mPct.toFixed(1) + '%';
  document.getElementById('stat-adam-pct').textContent = aPct.toFixed(1) + '%';
  document.getElementById('total-count').textContent = TOTAL;
}

// ── Render ────────────────────────────────────────────────

function renderToggles() {
  document.querySelectorAll('.toggle').forEach(btn => {
    const hotelId = btn.dataset.hotel;
    const person = btn.dataset.person;
    const active = isVisited(hotelId, person);
    btn.classList.toggle('active-marielle', person === 'marielle' && active);
    btn.classList.toggle('active-adam', person === 'adam' && active);
  });
}

function buildUI() {
  const container = document.getElementById('hotel-container');
  let html = '';

  for (const region of REGIONS) {
    const regionHotels = region.countries.reduce((n, c) => n + c.hotels.length, 0);
    html += `<div class="region" data-region="${region.name}">`;
    html += `<div class="region-header" onclick="toggleRegion(this)">`;
    html += `<span class="region-name">${region.name}</span>`;
    html += `<div class="region-meta"><span class="region-count">${regionHotels} hotels</span><span class="region-arrow">\u25BE</span></div>`;
    html += `</div>`;
    html += `<div class="region-body">`;

    for (const country of region.countries) {
      html += `<div class="country" data-country="${country.name}">`;
      html += `<div class="country-header" onclick="toggleCountry(this)">`;
      html += `<span class="country-flag">${country.flag}</span>`;
      html += `<span class="country-name">${country.name}</span>`;
      html += `<span class="country-count">${country.hotels.length}</span>`;
      html += `<span class="country-arrow">\u25BE</span>`;
      html += `</div>`;
      html += `<div class="country-body">`;
      html += `<div class="col-headers"><div class="col-headers-spacer"></div><div class="col-header m-label">M</div><div class="col-header a-label">A</div></div>`;
      html += `<ul class="hotel-list">`;

      for (const hotel of country.hotels) {
        const mActive = isVisited(hotel.id, 'marielle') ? ' active-marielle' : '';
        const aActive = isVisited(hotel.id, 'adam') ? ' active-adam' : '';
        html += `<li class="hotel-row" data-hotel-id="${hotel.id}" data-search="${(hotel.name + ' ' + hotel.city + ' ' + country.name).toLowerCase()}">`;
        html += `<div class="hotel-info"><div class="hotel-name">${hotel.name}</div><div class="hotel-city">${hotel.city}</div></div>`;
        html += `<div class="hotel-toggles">`;
        html += `<button class="toggle${mActive}" data-hotel="${hotel.id}" data-person="marielle" onclick="handleToggle(this)" aria-label="Marielle visited ${hotel.name}">M</button>`;
        html += `<button class="toggle${aActive}" data-hotel="${hotel.id}" data-person="adam" onclick="handleToggle(this)" aria-label="Adam visited ${hotel.name}">A</button>`;
        html += `</div>`;
        html += `</li>`;
      }

      html += `</ul></div></div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

// ── Interactions ──────────────────────────────────────────

function handleToggle(btn) {
  const hotelId = btn.dataset.hotel;
  const person = btn.dataset.person;
  const current = isVisited(hotelId, person);
  setVisited(hotelId, person, !current);

  btn.classList.toggle('active-marielle', person === 'marielle' && !current);
  btn.classList.toggle('active-adam', person === 'adam' && !current);

  if (activeFilter === 'visited') applyFilters();
}

function toggleRegion(header) {
  header.parentElement.classList.toggle('collapsed');
}

function toggleCountry(header) {
  header.parentElement.classList.toggle('collapsed');
}

// ── Filter ────────────────────────────────────────────────

let activeFilter = 'all';

function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  applyFilters();
}

// ── Search & Filter ──────────────────────────────────────

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const rows = document.querySelectorAll('.hotel-row');
  const countries = document.querySelectorAll('.country');
  const regions = document.querySelectorAll('.region');
  let visibleCount = 0;

  rows.forEach(row => {
    const matchesSearch = !q || row.dataset.search.includes(q);
    let matchesFilter = true;
    if (activeFilter === 'visited') {
      const hotelId = row.dataset.hotelId;
      matchesFilter = isVisited(hotelId, 'marielle') || isVisited(hotelId, 'adam');
    }
    const visible = matchesSearch && matchesFilter;
    row.style.display = visible ? '' : 'none';
    if (visible) visibleCount++;
  });

  // Show/hide countries and regions based on visible children
  countries.forEach(c => {
    const hasVisible = c.querySelector('.hotel-row:not([style*="none"])');
    c.style.display = hasVisible ? '' : 'none';
    if (q || activeFilter === 'visited') c.classList.remove('collapsed');
  });

  regions.forEach(r => {
    const hasVisible = r.querySelectorAll('.country:not([style*="none"])').length > 0;
    r.style.display = hasVisible ? '' : 'none';
    if (q || activeFilter === 'visited') r.classList.remove('collapsed');
  });

  document.getElementById('no-results').style.display = visibleCount === 0 && (q || activeFilter === 'visited') ? 'block' : 'none';
}

document.getElementById('search').addEventListener('input', applyFilters);

// ── Init ──────────────────────────────────────────────────

loadLocal();
buildUI();
updateStats();
fetchFromServer();
</script>
