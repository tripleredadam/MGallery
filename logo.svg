<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none">
  <!-- MGallery Logo -->
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfc49e"/>
      <stop offset="50%" stop-color="#c9a87c"/>
      <stop offset="100%" stop-color="#a8884f"/>
    </linearGradient>
  </defs>

  <!-- Stylised M -->
  <path d="M20 90 L20 30 L50 65 L80 30 L80 90"
        stroke="url(#gold-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Decorative line -->
  <line x1="100" y1="38" x2="100" y2="82" stroke="#c9a87c" stroke-width="0.8" opacity="0.4"/>

  <!-- GALLERY text -->
  <text x="118" y="70" font-family="'Cormorant Garamond', Georgia, serif" font-size="38" font-weight="300" letter-spacing="10" fill="#c9a87c">
    GALLERY
  </text>

  <!-- Thin accent lines -->
  <line x1="118" y1="78" x2="310" y2="78" stroke="#c9a87c" stroke-width="0.5" opacity="0.3"/>
</svg>
